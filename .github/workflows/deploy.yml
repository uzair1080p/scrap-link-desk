name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Find build output
        run: |
          echo "Current directory:"
          pwd
          echo "Root files:"
          ls -la
          echo "All index.html files:"
          find . -name "index.html" -print

      - name: Prepare GitHub Pages folder
        run: |
          if [ -f .output/public/index.html ]; then
            cp .output/public/index.html .output/public/404.html
            echo "PUBLISH_DIR=.output/public" >> $GITHUB_ENV

          elif [ -f dist/client/index.html ]; then
            cp dist/client/index.html dist/client/404.html
            echo "PUBLISH_DIR=dist/client" >> $GITHUB_ENV

          elif [ -f dist/index.html ]; then
            cp dist/index.html dist/404.html
            echo "PUBLISH_DIR=dist" >> $GITHUB_ENV

          elif [ -f build/client/index.html ]; then
            cp build/client/index.html build/client/404.html
            echo "PUBLISH_DIR=build/client" >> $GITHUB_ENV

          elif [ -f build/index.html ]; then
            cp build/index.html build/404.html
            echo "PUBLISH_DIR=build" >> $GITHUB_ENV

          else
            echo "No index.html found. Full project tree:"
            find . -maxdepth 4 -type f | sort
            exit 1
          fi

      - name: Confirm publish folder
        run: |
          echo "Publishing from: $PUBLISH_DIR"
          ls -la "$PUBLISH_DIR"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
